php-version = "8.3.0"

[source]
paths = ["examples", "tests"]
includes = ["vendor", "stubs"]
excludes = []

[formatter]
print-width = 120
tab-width = 4
use-tabs = false

[linter]
integrations = ["phpunit"]

[linter.rules]
literal-named-argument = { enabled = false }
too-many-methods = { enabled = false }
no-error-control-operator = { enabled = false }
