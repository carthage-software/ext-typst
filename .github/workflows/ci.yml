name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: bash

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - name: Install Composer dependencies
        run: composer update --no-interaction --prefer-dist --ignore-platform-req=ext-typst

      - name: Rust formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Rust tests
        run: cargo test

      - name: Mago lint
        run: vendor/bin/mago lint

      - name: Mago analyze
        run: vendor/bin/mago analyze

  build:
    name: PHP ${{ matrix.php }}-${{ matrix.ts }} (${{ matrix.name }})
    needs: checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-14]
        php: ['8.3', '8.4', '8.5']
        ts: [nts, ts]
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            ext: libext_typst.so
          - os: ubuntu-24.04-arm
            name: linux-aarch64
            ext: libext_typst.so
          - os: macos-14
            name: darwin-arm64
            ext: libext_typst.dylib

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-php${{ matrix.php }}-${{ matrix.ts }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        env:
          phpts: ${{ matrix.ts }}
        with:
          php-version: ${{ matrix.php }}
          tools: composer

      - name: Verify PHP thread safety
        run: |
          expected="${{ matrix.ts }}"
          actual=$(php -r "echo PHP_ZTS ? 'ts' : 'nts';")
          if [ "$expected" != "$actual" ]; then
            echo "::error::Expected PHP $expected but got $actual"
            exit 1
          fi

      - name: Build extension
        run: cargo build --release

      - name: Verify extension loads
        run: |
          php -d "extension=$GITHUB_WORKSPACE/target/release/${{ matrix.ext }}" \
            -r "var_dump(extension_loaded('typst'));"

      - name: Install Composer dependencies
        run: composer update --no-interaction --prefer-dist --ignore-platform-req=ext-typst

      - name: Run PHPUnit
        run: |
          php -d "extension=$GITHUB_WORKSPACE/target/release/${{ matrix.ext }}" \
            vendor/bin/phpunit

  build-musl:
    name: PHP ${{ matrix.php }}-nts (linux-x86_64-musl)
    needs: checks
    runs-on: ubuntu-latest
    container:
      image: php:${{ matrix.php }}-cli-alpine
    defaults:
      run:
        shell: sh
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']

    env:
      LIBCLANG_PATH: /usr/lib/llvm16/lib

    steps:
      - name: Install Alpine dependencies
        run: |
          apk add --no-cache \
            bash \
            build-base \
            clang16-libclang \
            curl \
            git \
            libxml2-dev \
            linux-headers \
            oniguruma-dev \
            openssl
          docker-php-ext-install dom mbstring xml xmlwriter

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: musl-php${{ matrix.php }}-nts

      - name: Install Composer
        run: |
          curl -sS https://getcomposer.org/installer -o composer-setup.php
          php composer-setup.php --install-dir=/usr/local/bin --filename=composer
          rm composer-setup.php

      - name: Verify PHP thread safety
        run: |
          actual=$(php -r "echo PHP_ZTS ? 'ts' : 'nts';")
          if [ "nts" != "$actual" ]; then
            echo "::error::Expected PHP nts but got $actual"
            exit 1
          fi

      - name: Build extension
        run: cargo build --release

      - name: Inspect linked libraries
        run: ldd target/release/libext_typst.so || true

      - name: Verify extension loads
        run: |
          php -d "extension=$GITHUB_WORKSPACE/target/release/libext_typst.so" \
            -r "var_dump(extension_loaded('typst'));"

      - name: Install Composer dependencies
        run: composer update --no-interaction --prefer-dist --ignore-platform-req=ext-typst

      - name: Run PHPUnit
        run: |
          php -d "extension=$GITHUB_WORKSPACE/target/release/libext_typst.so" \
            vendor/bin/phpunit
