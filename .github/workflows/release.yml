name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: bash

jobs:
  metadata:
    name: Extract metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Check for release
        id: is-release
        run: |
          unset IS_RELEASE
          if [[ "$GITHUB_REF" =~ ^refs/tags/[0-9].* ]]; then
            IS_RELEASE='true'
          fi
          echo "IS_RELEASE=${IS_RELEASE}" >> "$GITHUB_OUTPUT"

    outputs:
      version: ${{ steps.version.outputs.version }}
      is-release: ${{ steps.is-release.outputs.IS_RELEASE }}

  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    needs: metadata
    if: needs.metadata.outputs.is-release == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: PHP ${{ matrix.php }}-${{ matrix.ts }} (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: [metadata, create-release]
    if: always() && needs.metadata.result == 'success' && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-14]
        php: ['8.3', '8.4', '8.5']
        ts: [nts, ts]
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            arch: x86_64
            platform: linux
            libc: glibc
            ext-file: libext_typst.so
            so-name: typst.so
          - os: ubuntu-24.04-arm
            name: linux-aarch64
            arch: aarch64
            platform: linux
            libc: glibc
            ext-file: libext_typst.so
            so-name: typst.so
          - os: macos-14
            name: darwin-arm64
            arch: arm64
            platform: darwin
            libc: bsdlibc
            ext-file: libext_typst.dylib
            so-name: typst.so

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.os }}-php${{ matrix.php }}-${{ matrix.ts }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        env:
          phpts: ${{ matrix.ts }}
        with:
          php-version: ${{ matrix.php }}
          tools: composer

      - name: Verify PHP thread safety
        run: |
          expected="${{ matrix.ts }}"
          actual=$(php -r "echo PHP_ZTS ? 'ts' : 'nts';")
          if [ "$expected" != "$actual" ]; then
            echo "::error::Expected PHP $expected but got $actual"
            exit 1
          fi

      - name: Build extension
        run: cargo build --release

      - name: Verify extension loads
        run: |
          php -d "extension=$GITHUB_WORKSPACE/target/release/${{ matrix.ext-file }}" \
            -r "var_dump(extension_loaded('typst'));"

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --ignore-platform-req=ext-typst

      - name: Run PHPUnit
        run: |
          php -d "extension=$GITHUB_WORKSPACE/target/release/${{ matrix.ext-file }}" \
            vendor/bin/phpunit

      - name: Package binary
        id: package
        run: |
          VERSION="${{ needs.metadata.outputs.version }}"
          TS_SUFFIX=""
          if [ "${{ matrix.ts }}" = "ts" ]; then
            TS_SUFFIX="-zts"
          fi

          PKG_NAME="php_typst-${VERSION}_php${{ matrix.php }}-${{ matrix.arch }}-${{ matrix.platform }}-${{ matrix.libc }}${TS_SUFFIX}"
          STAGING="_release/${PKG_NAME}"
          mkdir -p "${STAGING}"

          cp "target/release/${{ matrix.ext-file }}" "${STAGING}/${{ matrix.so-name }}"

          cd _release
          zip -r "${PKG_NAME}.zip" "${PKG_NAME}"
          cd ..

          echo "PKG_NAME=${PKG_NAME}.zip" >> "$GITHUB_OUTPUT"
          echo "PKG_PATH=_release/${PKG_NAME}.zip" >> "$GITHUB_OUTPUT"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ steps.package.outputs.PKG_PATH }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.PKG_NAME }}
          path: ${{ steps.package.outputs.PKG_PATH }}

      - name: Upload to release
        if: needs.metadata.outputs.is-release == 'true'
        run: gh release upload "${{ github.ref_name }}" "${{ steps.package.outputs.PKG_PATH }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [metadata, build]
    if: needs.metadata.outputs.is-release == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Publish release
        run: gh release edit "${{ github.ref_name }}" --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
